<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CodeQuiz</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--sf:#161a24;--sf2:#1e2433;--sf3:#252c3d;
  --bd:#2a3045;--tx:#e2e8f8;--sub:#7a8aaa;--dim:#4a5570;
  --ac:#4f8ef7;--pu:#a78bfa;--gr:#2ecc8f;--rd:#f25c7a;--ye:#f7c94f;
  --gg:rgba(46,204,143,.14);--rg:rgba(242,92,122,.14);
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --r:13px;--rs:8px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
body{display:flex;justify-content:center;}
#app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;}

/* ===== PAGE STACK ===== */
/* Only one .page is shown at a time via JS .hide/.show */
.page{display:none;flex-direction:column;flex:1;min-height:100vh;animation:pgIn .25s ease;}
.page.active{display:flex;}
@keyframes pgIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}

.pscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:40px;}
.pscroll::-webkit-scrollbar{width:3px}
.pscroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;}
.tbback{width:34px;height:34px;border-radius:var(--rs);background:var(--sf2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--sub);flex-shrink:0;}
.tbback:active{background:var(--sf3);}
.tbtitle{font-size:15px;font-weight:700;color:var(--tx);}
.tbsub{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px;}

/* ===== HOME ===== */
.home-head{padding:20px 16px 12px;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.logo-box{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--pu));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:16px;color:#fff;}
.logo-name{font-family:var(--mono);font-size:18px;font-weight:700;}
.logo-name span{color:var(--ac);}
.sec-label{font-size:10px;font-family:var(--mono);color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:0 16px;margin-bottom:8px;}

/* 復習バナー */
.rev-banner{margin:0 12px 18px;background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(79,142,247,.1));border:1px solid rgba(167,139,250,.28);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.rev-banner:active{opacity:.75;}
.rev-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--pu),var(--ac));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.rev-body{flex:1;}
.rev-title{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.rev-sub{font-size:11px;color:var(--sub);}
.rev-badge{background:var(--pu);color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;min-width:24px;text-align:center;}

/* 言語リスト */
.lang-list{display:flex;flex-direction:column;gap:9px;padding:0 12px 24px;}
.lang-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;gap:0;cursor:pointer;overflow:hidden;position:relative;}
.lang-card:active{background:var(--sf2);}
.lang-stripe{width:4px;align-self:stretch;flex-shrink:0;}
.lang-emoji{width:54px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;padding:14px 0;}
.lang-info{flex:1;padding:14px 0;}
.lang-name{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.lang-desc{font-size:11px;color:var(--sub);}
.lang-meta{padding-right:14px;text-align:right;}
.lang-qcount{font-family:var(--mono);font-size:12px;color:var(--dim);}
.lang-catc{font-size:10px;color:var(--dim);margin-top:1px;}
.lang-arr{color:var(--dim);font-size:18px;padding-right:12px;}

.progress-mini{margin-top:6px;width:100%;height:4px;background:var(--sf3);border-radius:999px;overflow:hidden;}
.progress-mini-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:999px;width:0%;}
.progress-text{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:4px;}
.cat-progress{margin-top:7px;width:100%;height:4px;background:var(--sf3);border-radius:999px;overflow:hidden;}
.cat-progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:999px;width:0%;}
.rev-tools{display:flex;gap:8px;padding:0 12px 16px;}
.rev-mini-btn{flex:1;background:var(--sf);border:1px solid var(--bd);color:var(--sub);font-size:11px;font-weight:700;border-radius:var(--rs);padding:9px;cursor:pointer;}
.rev-mini-btn:active{background:var(--sf2);}

/* ===== CATEGORY ===== */
.cat-list{display:flex;flex-direction:column;gap:8px;padding:12px;}
.cat-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.cat-card:active{background:var(--sf2);border-color:rgba(79,142,247,.4);}
.cat-icon{width:34px;height:34px;border-radius:8px;background:var(--sf3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.cat-body{flex:1;}
.cat-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.cat-sub{font-size:11px;color:var(--sub);}
.cat-pill{font-family:var(--mono);font-size:10px;color:var(--dim);background:var(--sf3);border:1px solid var(--bd);padding:2px 8px;border-radius:20px;}
.cat-arr{color:var(--dim);font-size:16px;}

/* ===== QUIZ ===== */
.qprog-bar{height:3px;background:var(--bd);flex-shrink:0;}
.qprog-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));transition:width .4s ease;}

.quiz-body{display:flex;flex-direction:column;gap:13px;padding:14px 12px 32px;}

.q-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;}
.q-label{font-family:var(--mono);font-size:10px;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.q-text{font-size:14px;line-height:1.75;color:var(--tx);font-weight:500;}
.q-code{font-family:var(--mono);background:var(--sf3);border:1px solid var(--bd);color:var(--ye);padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.7;margin-top:10px;white-space:pre;overflow-x:auto;}

.choices{display:flex;flex-direction:column;gap:8px;}
.choice{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;text-align:left;}
.choice:not(:disabled):active{transform:scale(.98);}
.choice:not(:disabled):hover{background:var(--sf2);}
.ckey{width:26px;height:26px;border-radius:6px;background:var(--sf3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--sub);flex-shrink:0;}
.ctxt{font-family:var(--mono);font-size:12px;color:var(--tx);line-height:1.5;flex:1;}
.choice.ok{background:var(--gg);border-color:var(--gr);}
.choice.ok .ckey{background:var(--gr);border-color:var(--gr);color:#fff;}
.choice.ng{background:var(--rg);border-color:var(--rd);}
.choice.ng .ckey{background:var(--rd);border-color:var(--rd);color:#fff;}
.choice.rev{background:rgba(46,204,143,.07);border-color:rgba(46,204,143,.35);}
.choice.rev .ckey{background:rgba(46,204,143,.25);border-color:var(--gr);color:var(--gr);}
.choice:disabled{cursor:default;}

.feedback{border-radius:var(--r);padding:14px 16px;display:none;border:1px solid transparent;}
.feedback.ok{display:block;background:var(--gg);border-color:rgba(46,204,143,.3);}
.feedback.ng{display:block;background:var(--rg);border-color:rgba(242,92,122,.3);}
.fb-head{font-size:14px;font-weight:700;margin-bottom:7px;}
.feedback.ok .fb-head{color:var(--gr);}
.feedback.ng .fb-head{color:var(--rd);}
.fb-ans{font-family:var(--mono);color:var(--ye);font-size:11px;background:var(--sf3);border:1px solid var(--bd);display:inline-block;padding:2px 8px;border-radius:4px;margin-bottom:8px;}
.fb-exp{font-size:12px;color:var(--sub);line-height:1.75;}

.next-wrap{padding:0 12px 12px;flex-shrink:0;}
.next-btn{width:100%;padding:14px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--ac),#6366f1);color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;display:none;}
.next-btn.show{display:block;}
.next-btn:active{opacity:.85;}

/* ===== RESULT ===== */
.res-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:36px 18px 48px;gap:18px;}
.res-trophy{font-size:60px;}
.res-card{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:22px 24px;}
.rs-label{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.rs-num{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1;}
.rs-denom{font-size:13px;color:var(--sub);margin-top:2px;}
.rs-bar-bg{height:5px;background:var(--bd);border-radius:3px;margin-top:14px;overflow:hidden;}
.rs-bar{height:100%;border-radius:3px;width:0;transition:width .9s .2s ease;}
.gp .rs-num,.gp .rs-bar{color:var(--ye);background:var(--ye);}
.gg .rs-num,.gg .rs-bar{color:var(--gr);background:var(--gr);}
.gok .rs-num,.gok .rs-bar{color:var(--ac);background:var(--ac);}
.gb .rs-num,.gb .rs-bar{color:var(--rd);background:var(--rd);}
.res-msg{font-size:14px;color:var(--tx);font-weight:500;line-height:1.6;text-align:center;}
.res-note{width:100%;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);border-radius:var(--rs);padding:13px 16px;font-size:12px;color:var(--sub);line-height:1.7;}
.res-note strong{color:var(--pu);}
.res-btn{width:100%;padding:14px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--ac),#6366f1);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.res-btn:active{opacity:.85;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--sf3);border:1px solid var(--bd);border-radius:24px;padding:9px 18px;font-size:12px;color:var(--sub);white-space:nowrap;transition:transform .25s ease;z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

<!-- ① ホーム -->
<div class="page active" id="pg-home">
  <div class="pscroll">
    <div class="home-head">
      <div class="logo">
        <div class="logo-box">&lt;/&gt;</div>
        <div class="logo-name">Code<span>Quiz</span></div>
      </div>
    </div>
    <div class="sec-label">復習</div>
    <div class="rev-banner" id="rev-banner" onclick="startReview()">
      <div class="rev-icon">🔁</div>
      <div class="rev-body">
        <div class="rev-title">間違えた問題を復習する</div>
        <div class="rev-sub" id="rev-sub">復習リストは空です</div>
      </div>
      <div class="rev-badge" id="rev-badge">0</div>
    </div>
    <div class="rev-tools">
      <button class="rev-mini-btn" onclick="clearReviewList(event)">復習リストを空にする</button>
      <button class="rev-mini-btn" onclick="clearProgress(event)">進捗をリセット</button>
    </div>
    <div class="sec-label">言語を選ぶ</div>
    <div class="lang-list" id="lang-list"></div>
  </div>
</div>

<!-- ② カテゴリー -->
<div class="page" id="pg-cat">
  <div class="topbar">
    <div class="tbback" onclick="nav('pg-home')">←</div>
    <div>
      <div class="tbtitle" id="cat-title">カテゴリー</div>
      <div class="tbsub" id="cat-sub"></div>
    </div>
  </div>
  <div class="pscroll">
    <div class="cat-list" id="cat-list"></div>
  </div>
</div>

<!-- ③ クイズ -->
<div class="page" id="pg-quiz">
  <div class="topbar">
    <div class="tbback" onclick="backFromQuiz()">←</div>
    <div style="flex:1">
      <div class="tbtitle" id="qtitle"></div>
      <div class="tbsub" id="qsub"></div>
    </div>
  </div>
  <div class="qprog-bar"><div class="qprog-fill" id="qprog"></div></div>
  <div class="pscroll">
    <div class="quiz-body">
      <div class="q-card">
        <div class="q-label">Question</div>
        <div class="q-text" id="qtext"></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback">
        <div class="fb-head" id="fb-head"></div>
        <div id="fb-ans"></div>
        <div class="fb-exp" id="fb-exp"></div>
      </div>
    </div>
  </div>
  <div class="next-wrap">
    <button class="next-btn" id="next-btn" onclick="nextQ()">次の問題へ →</button>
  </div>
</div>

<!-- ④ 結果 -->
<div class="page" id="pg-result">
  <div class="topbar">
    <div class="tbback" onclick="nav('pg-home')">✕</div>
    <div><div class="tbtitle">結果</div></div>
  </div>
  <div class="res-body">
    <div class="res-trophy" id="res-trophy">🏆</div>
    <div class="res-card" id="res-card">
      <div class="rs-label">Score</div>
      <div class="rs-num" id="rs-num">0</div>
      <div class="rs-denom" id="rs-denom">/ 0 問中</div>
      <div class="rs-bar-bg"><div class="rs-bar" id="rs-bar"></div></div>
    </div>
    <div class="res-msg" id="res-msg"></div>
    <div class="res-note" id="res-note" style="display:none"></div>
    <button class="res-btn" onclick="nav('pg-home')">メインメニューへ戻る</button>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>

// ================================================================
// DATA
// ================================================================
const DATA = {
  "python": {
    "title": "Python",
    "emoji": "🐍",
    "desc": "データ・AI・自動化に強い汎用言語",
    "categories": {
      "output": {
        "title": "基本の出力（print）",
        "icon": "📤",
        "questions": [
          {
            "q": "画面に『Hello』と表示する正しいコードは？",
            "exp": "Pythonで画面（コンソール）に文字を表示するときは print() 関数を使います。文字列はクォートで囲み、print('Hello') のように書きます。",
            "choices": [
              {
                "text": "print('Hello')",
                "correct": true,
                "reason": "正解。Pythonで画面（コンソール）に文字を表示するときは print() 関数を使います。文字列はクォートで囲み、print('Hello') のように書きます。"
              },
              {
                "text": "echo('Hello')",
                "correct": false,
                "reason": "不正解。echo はPHPやシェルで見かける出力の書き方です。Pythonの標準出力では print() を使います。"
              },
              {
                "text": "console.log('Hello')",
                "correct": false,
                "reason": "不正解。console.log() はJavaScriptでブラウザのコンソールに出力するときの書き方です。Pythonでは使いません。"
              },
              {
                "text": "System.out.println('Hello')",
                "correct": false,
                "reason": "不正解。System.out.println はJavaの代表的な出力方法です。Pythonでは print('Hello') と短く書きます。"
              }
            ]
          },
          {
            "q": "複数の値を渡したとき、値の間に入るデフォルトの文字は？",
            "exp": "Pythonの print() に複数の値を渡すと、値の間にはデフォルトで半角スペースが入ります。変更したい場合は sep='-' のように sep 引数を指定します。",
            "choices": [
              {
                "text": "スペース（半角）",
                "correct": true,
                "reason": "正解。Pythonの print() に複数の値を渡すと、値の間にはデフォルトで半角スペースが入ります。変更したい場合は sep='-' のように sep 引数を指定します。"
              },
              {
                "text": "カンマ（,）",
                "correct": false,
                "reason": "不正解。正解の「スペース（半角）」と比べると、文法・キーワード・用途のどこかが問題文と合っていません。"
              },
              {
                "text": "何も入らない",
                "correct": false,
                "reason": "不正解。正解の「スペース（半角）」と比べると、文法・キーワード・用途のどこかが問題文と合っていません。"
              },
              {
                "text": "タブ文字",
                "correct": false,
                "reason": "不正解。タブ区切りにしたい場合は sep='\\t' のように明示する必要があります。デフォルトは半角スペースです。"
              }
            ]
          },
          {
            "q": "print()で改行なしに出力するには？",
            "exp": "print() は標準では最後に改行を付けます。改行したくないときは end='' を指定して、末尾に入る文字を空文字にします。",
            "choices": [
              {
                "text": "print('text', end='')",
                "correct": true,
                "reason": "正解。print() の end 引数は末尾に付ける文字を指定します。end='' にすると改行が付きません。"
              },
              {
                "text": "print('text', newline=False)",
                "correct": false,
                "reason": "不正解。Pythonの print() に newline という引数はありません。改行制御には end を使います。"
              },
              {
                "text": "print('text\\n')",
                "correct": false,
                "reason": "不正解。正解の「print('text', end='')」と比べると、文法・キーワード・用途のどこかが問題文と合っていません。"
              },
              {
                "text": "nprint('text')",
                "correct": false,
                "reason": "不正解。nprint() というPython標準関数はありません。print() の引数で制御します。"
              }
            ]
          },
          {
            "q": "変数 name='World' のとき 'Hello World' と出力するには？",
            "exp": "Pythonでは f文字列を使うと、文字列の中に変数を埋め込めます。f'Hello {name}' の {name} が変数 name の中身に置き換わります。",
            "choices": [
              {
                "text": "print(f'Hello {name}')",
                "correct": true,
                "reason": "正解。f文字列なので {name} が変数 name の中身 World に置き換わり、Hello World と出力されます。"
              },
              {
                "text": "print('Hello' + name)",
                "correct": false,
                "reason": "不正解。これは HelloWorld になり、間のスペースがありません。'Hello ' + name なら近いですが、問題の選択肢としては不十分です。"
              },
              {
                "text": "print('Hello {name}')",
                "correct": false,
                "reason": "不正解。先頭に f がない普通の文字列なので、{name} は変数ではなくそのまま文字として表示されます。"
              },
              {
                "text": "print('Hello',+name)",
                "correct": false,
                "reason": "不正解。+name は数値の符号のような扱いになり、文字列 name には使えません。カンマで区切るなら print('Hello', name) です。"
              }
            ]
          },
          {
            "q": "print('a','b',sep='-') の出力結果は？",
            "exp": "sep は print() に複数の値を渡したとき、値と値の間に入る文字を指定します。sep='-' なら a と b の間に - が入ります。",
            "choices": [
              {
                "text": "a-b",
                "correct": true,
                "reason": "正解。sep は print() に複数の値を渡したとき、値と値の間に入る文字を指定します。sep='-' なら a と b の間に - が入ります。"
              },
              {
                "text": "a b",
                "correct": false,
                "reason": "不正解。これは sep を指定しない場合のデフォルトに近い出力です。今回は sep='-' が指定されています。"
              },
              {
                "text": "a,b",
                "correct": false,
                "reason": "不正解。コード上ではカンマで引数を区切っていますが、出力の区切りは sep で指定された '-' になります。"
              },
              {
                "text": "ab",
                "correct": false,

function nav(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if (pageId === 'pg-home') refreshHome();
}

function backFromQuiz() {
  if (confirm('メインメニューに戻りますか？（進捗はリセットされます）')) {
    nav('pg-home');
  }
}

// ================================================================
// PROGRESS HELPERS
// ================================================================
function progressKey(lk, ck) {
  return lk + '::' + ck;
}

function getCatProgress(lk, ck) {
  return progressStore[progressKey(lk, ck)] || {
    attempts: 0,
    bestPct: 0,
    bestCorrect: 0,
    total: 0,
    lastPct: 0,
    lastCorrect: 0,
    updatedAt: null
  };
}

function saveProgress() {
  try { localStorage.setItem('cq_progress', JSON.stringify(progressStore)); } catch(e){}
}

function recordCategoryProgress(lk, ck, correct, total) {
  if (!lk || !ck || !total) return;
  const key = progressKey(lk, ck);
  const prev = getCatProgress(lk, ck);
  const pct = Math.round(correct / total * 100);

  progressStore[key] = {
    attempts: (prev.attempts || 0) + 1,
    bestPct: Math.max(prev.bestPct || 0, pct),
    bestCorrect: pct >= (prev.bestPct || 0) ? correct : (prev.bestCorrect || 0),
    total,
    lastPct: pct,
    lastCorrect: correct,
    updatedAt: new Date().toISOString()
  };
  saveProgress();
}

function getLanguageProgress(lk) {
  const lang = DATA[lk];
  const entries = Object.entries(lang.categories);
  if (!entries.length) return {done:0,total:0,avg:0,attempted:0};

  let done = 0;
  let sum = 0;
  let attempted = 0;

  entries.forEach(([ck]) => {
    const p = getCatProgress(lk, ck);
    if (p.attempts > 0) attempted++;
    if ((p.bestPct || 0) >= 100) done++;
    sum += p.bestPct || 0;
  });

  return {
    done,
    total: entries.length,
    avg: Math.round(sum / entries.length),
    attempted
  };
}

function clearReviewList(event) {
  if (event) event.stopPropagation();
  if (!reviewList.length) { showToast('復習リストはすでに空です'); return; }
  if (!confirm('復習リストを空にしますか？')) return;
  reviewList = [];
  saveReview();
  refreshHome();
  showToast('復習リストを空にしました');
}

function clearProgress(event) {
  if (event) event.stopPropagation();
  if (!confirm('カテゴリごとの進捗をリセットしますか？')) return;
  progressStore = {};
  saveProgress();
  buildHome();
  showToast('進捗をリセットしました');
}

function refreshHome() {
  const n = reviewList.length;
  document.getElementById('rev-badge').textContent = n;

  if (n === 0) {
    document.getElementById('rev-sub').textContent = '復習リストは空です';
    return;
  }

  const langCounts = {};
  reviewList.forEach(q => {
    const lk = q._lang || 'unknown';
    langCounts[lk] = (langCounts[lk] || 0) + 1;
  });

  const summary = Object.entries(langCounts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,2)
    .map(([lk,count]) => (DATA[lk] ? DATA[lk].title : 'その他') + count + '問')
    .join(' / ');

  document.getElementById('rev-sub').textContent = summary ? `${n}問が復習待ちです（${summary}）` : n+'問が復習待ちです';
}

function buildHome() {
  const ll = document.getElementById('lang-list');
  ll.innerHTML = '';
  Object.entries(DATA).forEach(([lk, lang]) => {
    const totalQ = Object.values(lang.categories).reduce((s,c)=>s+c.questions.length, 0);
    const catCount = Object.keys(lang.categories).length;
    const stripeColors = {python:'#3b82f6,#06b6d4', html:'#f97316,#ef4444', css:'#06b6d4,#6366f1', javascript:'#eab308,#f97316'};
    const lp = getLanguageProgress(lk);
    const card = document.createElement('div');
    card.className = 'lang-card';
    card.innerHTML = `
      <div class="lang-stripe" style="background:linear-gradient(180deg,${stripeColors[lk]||'#4f8ef7,#a78bfa'})"></div>
      <div class="lang-emoji">${lang.emoji}</div>
      <div class="lang-info">
        <div class="lang-name">${lang.title}</div>
        <div class="lang-desc">${lang.desc}</div>
        <div class="progress-mini"><div class="progress-mini-fill" style="width:${lp.avg}%"></div></div>
        <div class="progress-text">平均ベスト ${lp.avg}% ・ 完了 ${lp.done}/${lp.total}</div>
      </div>
      <div class="lang-meta">
        <div class="lang-qcount">${totalQ}問</div>
        <div class="lang-catc">${catCount}カテゴリー</div>
      </div>
      <div class="lang-arr">›</div>`;
    card.onclick = () => openCat(lk);
    ll.appendChild(card);
  });
  refreshHome();
}

  curLang = lk;
  const lang = DATA[lk];
  document.getElementById('cat-title').textContent = lang.emoji + ' ' + lang.title;
  document.getElementById('cat-sub').textContent = Object.keys(lang.categories).length + ' カテゴリー';
  const cl = document.getElementById('cat-list');
  cl.innerHTML = '';

      : `${cat.questions.length}問 ・ 未挑戦`;
    const item = document.createElement('div');
    item.className = 'cat-card';
    item.innerHTML = `
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-body">
        <div class="cat-title">${cat.title}</div>
        <div class="cat-sub">${subText}</div>
        <div class="cat-progress"><div class="cat-progress-fill" style="width:${cp.bestPct || 0}%"></div></div>
      </div>
      <div class="cat-pill">${cp.attempts > 0 ? cp.bestPct + '%' : cat.questions.length + 'Q'}</div>
      <div class="cat-arr">›</div>`;
    item.onclick = () => startQuiz(lk, ck);
    cl.appendChild(item);
  });
  nav('pg-cat');
}

// ================================================================
// QUIZ HELPERS
// ================================================================
function cloneObj(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function shuffleArray(arr) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function normalizeChoices(source) {
  if (Array.isArray(source.choices) && source.choices.length > 0) {
    return source.choices.map(choice => ({
      text: String(choice.text),
      correct: !!choice.correct,
      reason: choice.reason || choice.why || ''
    }));
  }

  if (Array.isArray(source.a)) {
    return source.a.map((text, index) => ({
      text: String(text),
      correct: index === source.c,
      reason: source.why && source.why[index] ? source.why[index] : ''
    }));
  }

  return [];
}

function prepareQuestion(rawQuestion) {
  const source = cloneObj(rawQuestion._source || rawQuestion);
  const baseChoices = normalizeChoices(source);

  const correctCount = baseChoices.filter(choice => choice.correct).length;
  if (correctCount !== 1) {
    console.warn('正解フラグが1つではない問題があります:', source.q, baseChoices);
  }

  const prepared = {
    q: source.q,
    exp: source.exp || '',
    _source: {
      q: source.q,
      exp: source.exp || '',
      choices: baseChoices.map(choice => ({...choice}))
    },
    choices: shuffleArray(baseChoices).map(choice => ({...choice}))
  };

  // 古い処理や復習データとの互換用。実際の判定は choices[].correct を使う。
  prepared.a = prepared.choices.map(choice => choice.text);
  prepared.c = prepared.choices.findIndex(choice => choice.correct);

  return prepared;
}

function renderExplanation(q) {
  const choices = q.choices || [];

  let html = `<div>${esc(q.exp || '')}</div>`;
  html += `<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--bd);">`;
  html += `<div style="margin-bottom:8px;color:var(--tx);font-weight:700;">選択肢ごとの確認</div>`;

  choices.forEach((choice, i) => {
    const mark = choice.correct ? '✅' : '❌';
    const color = choice.correct ? 'var(--gr)' : 'var(--rd)';
    html += `
      <div style="margin-top:8px;padding:9px 10px;border-radius:8px;background:var(--sf3);border:1px solid var(--bd);">
        <div style="font-family:var(--mono);font-size:11px;color:${color};font-weight:700;margin-bottom:4px;">
          ${mark} ${['A','B','C','D'][i]}：${esc(choice.text)}
        </div>
        <div style="font-size:12px;line-height:1.7;color:var(--sub);">
          ${esc(choice.reason || '')}
        </div>
      </div>`;
  });

  html += `</div>`;
  return html;
}

// ================================================================
// QUIZ
// ================================================================
function startQuiz(lk, ck) {
  isReview = false;
  curLang = lk;
  curCat = ck;
  const cat = DATA[lk].categories[ck];
  curQs = cat.questions.map(q => prepareQuestion(q));
  curIdx = 0; correctCnt = 0; newMistakes = [];
  document.getElementById('qtitle').textContent = cat.icon + ' ' + cat.title;
  nav('pg-quiz');
  renderQ();
}

function startReview() {
  if (!reviewList.length) { showToast('復習リストが空です 🎉'); return; }
  isReview = true;
  curCat = null;
  curQs = reviewList.map(q => prepareQuestion(q));
  curIdx = 0; correctCnt = 0; newMistakes = [];
  document.getElementById('qtitle').textContent = '🔁 復習モード';
  nav('pg-quiz');
  renderQ();
}

function renderQ() {
  const q = curQs[curIdx];
  const total = curQs.length;
  document.getElementById('qsub').textContent = (curIdx+1) + ' / ' + total + ' 問目';
  document.getElementById('qprog').style.width = (curIdx/total*100) + '%';

  const lines = q.q.split('\n');
  let html = esc(lines[0]);
  if (lines.length > 1) {
    html += '<div class="q-code">' + esc(lines.slice(1).join('\n')) + '</div>';
  }
  document.getElementById('qtext').innerHTML = html;

  const choices = q.choices || [];
  const cl = document.getElementById('choices');
  cl.innerHTML = '';

  choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<div class="ckey">${['A','B','C','D'][i]}</div><div class="ctxt">${esc(choice.text)}</div>`;
    btn.onclick = () => onAnswer(choice, q, i);
    cl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('fb-ans').innerHTML = '';
  document.getElementById('fb-exp').textContent = '';
  const nb = document.getElementById('next-btn');
  nb.classList.remove('show');
  nb.textContent = (curIdx+1 < total) ? '次の問題へ →' : '結果を見る →';

  document.getElementById('pg-quiz').querySelector('.pscroll').scrollTop = 0;
}

function onAnswer(selectedChoice, q, selectedIndex) {
  const btns = document.querySelectorAll('#pg-quiz .choice');
  btns.forEach(b => b.disabled = true);

  const choices = q.choices || [];
  const correctIndex = choices.findIndex(choice => choice.correct);
  const correctChoice = choices[correctIndex];
  const isOk = !!selectedChoice.correct;

  if (correctIndex >= 0 && btns[correctIndex]) btns[correctIndex].classList.add('rev');
  if (btns[selectedIndex]) btns[selectedIndex].classList.add(isOk ? 'ok' : 'ng');

  if (isOk) {
    correctCnt++;
    if (isReview) {
      reviewList = reviewList.filter(r => r.q !== q.q);
      saveReview();
    }
  } else {
    if (!isReview) {
      const dup = reviewList.some(r => r.q === q.q);
      if (!dup) {
        const reviewItem = cloneObj(q._source || q);
        reviewItem._lang = curLang;
        reviewItem._cat = curCat;
        reviewList.push(reviewItem);
        newMistakes.push(q);
        saveReview();
      }
    }
  }

  document.getElementById('fb-head').textContent = isOk ? '正解！🎉' : '不正解... ❌';
  document.getElementById('fb-ans').innerHTML = isOk ? '' : `<div class="fb-ans">正解: ${esc(correctChoice ? correctChoice.text : '')}</div>`;
  document.getElementById('fb-exp').innerHTML = renderExplanation(q);
  document.getElementById('feedback').className = 'feedback ' + (isOk ? 'ok' : 'ng');
  document.getElementById('next-btn').classList.add('show');
}

function nextQ() {
  curIdx++;
  if (curIdx >= curQs.length) showResult();
  else renderQ();
}

// ================================================================
// RESULT
// ================================================================
function showResult() {
  const total = curQs.length;
  const pct = Math.round(correctCnt/total*100);
  if (!isReview) recordCategoryProgress(curLang, curCat, correctCnt, total);
  let gc, trophy, msg;
  if (pct===100) { gc='gp'; trophy='🏆'; msg='完璧！全問正解です！素晴らしい👏'; }
  else if (pct>=70){ gc='gg'; trophy='🌟'; msg='よくできました！もう一息で完璧です。'; }
  else if (pct>=40){ gc='gok'; trophy='📚'; msg='もう少し！復習してもう一度挑戦しましょう。'; }
  else             { gc='gb';  trophy='💪'; msg='基礎から見直してみましょう。諦めずに！'; }

  document.getElementById('res-trophy').textContent = trophy;
  document.getElementById('res-card').className = 'res-card ' + gc;
  document.getElementById('rs-num').textContent = correctCnt;
  document.getElementById('rs-denom').textContent = '/ ' + total + ' 問中正解';
  document.getElementById('rs-bar').style.width = '0%';
  document.getElementById('res-msg').textContent = msg;

  const note = document.getElementById('res-note');
  if (newMistakes.length > 0) {
    note.style.display = 'block';
    note.innerHTML = '<strong>'+newMistakes.length+'問</strong>が復習リストに登録されました。<br>トップの <strong>「復習する」</strong> からいつでも再挑戦できます！';
  } else if (isReview && correctCnt===total) {
    note.style.display = 'block';
    note.innerHTML = '🎉 復習リストの問題を<strong>すべてクリア</strong>しました！';
  } else {
    note.style.display = 'none';
  }

  if (!isReview && curLang && curCat) {
    const p = getCatProgress(curLang, curCat);
    if (note.style.display === 'none') note.style.display = 'block';
    note.innerHTML = (note.innerHTML ? note.innerHTML + '<br><br>' : '') +
      '📈 このカテゴリのベスト：<strong>' + p.bestPct + '%</strong>（挑戦 ' + p.attempts + '回）';
  }

  nav('pg-result');
  setTimeout(() => { document.getElementById('rs-bar').style.width = pct + '%'; }, 100);
}

// ================================================================
// UTILS
// ================================================================
function saveReview() {
  try { localStorage.setItem('cq_rv', JSON.stringify(reviewList)); } catch(e){}
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ================================================================
// BOOT
// ================================================================
buildHome();

</script>
